server:
    # ── Performance fix: ytimg.com DNSSEC validation bypass ────
    domain-insecure: "ytimg.com"

    # ── Performance fix: NTP ratelimit whitelist ────────────────
    ratelimit-below-domain: pool.ntp.org 0

    # ── Client fix: suppress .bbrouter spurious search queries ──
    local-zone: "bbrouter." always_nxdomain

    # ── Security: block DoH provider resolution (bypass prevention)
    local-zone: "dns.adguard.com." always_nxdomain
    local-zone: "cloudflare-dns.com." always_nxdomain

    # ── Content filtering: adult content domain ──────────────────
    local-zone: "bongamodels.com." always_nxdomain
