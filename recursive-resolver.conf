server:
    # ── Interface ──────────────────────────────────────────────
    interface: 102.219.211.211
    interface: 127.0.0.1
    port: 53

    # ── Access control ─────────────────────────────────────────
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow
    access-control: 102.219.208.0/22 allow
    access-control: 102.213.48.0/22 allow
    access-control: 102.209.56.0/22 allow

    # ── Root hints ─────────────────────────────────────────────
    root-hints: "/var/lib/unbound/root.hints"

    # ── Logging (minimal for performance) ──────────────────────
    verbosity: 1
    log-queries: yes
    log-replies: yes

    # ── Threads & sockets (match CPU count) ────────────────────
    num-threads: 24
    so-reuseport: yes
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # ── Per-thread query capacity ───────────────────────────────
    outgoing-range: 8192
    num-queries-per-thread: 8192
    jostle-timeout: 200
    delay-close: 10000

    # ── Cache sizing (16 GB RAM) ────────────────────────────────
    # Slabs: power of 2 >= num-threads
    msg-cache-size: 512m
    msg-cache-slabs: 32
    rrset-cache-size: 1024m
    rrset-cache-slabs: 32
    key-cache-size: 256m
    key-cache-slabs: 32
    neg-cache-size: 128m
    infra-cache-numhosts: 100000
    infra-cache-slabs: 32

    # ── TTL policy ──────────────────────────────────────────────
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # ── Serve-stale (answer from expired cache while refreshing) 
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-reply-ttl: 30

    # ── Prefetching ─────────────────────────────────────────────
    prefetch: yes
    prefetch-key: yes
    target-fetch-policy: "3 2 1 1 1"

    # ── EDNS ────────────────────────────────────────────────────
    edns-buffer-size: 1472

    # ── Response optimisations ──────────────────────────────────
    minimal-responses: yes
    deny-any: yes

    # ── DNSSEC hardening ────────────────────────────────────────
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    aggressive-nsec: yes
    val-clean-additional: yes
    unwanted-reply-threshold: 10000000

    # ── Privacy hardening ────────────────────────────────────────
    hide-identity: yes
    hide-version: yes
    use-caps-for-id: yes
    qname-minimisation: yes
    qname-minimisation-strict: no

    # ── DNS rebinding protection ─────────────────────────────────
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # ── Rate limiting ────────────────────────────────────────────
    ratelimit: 1000
    ip-ratelimit: 1000
    ip-ratelimit-factor: 10
